<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
  <h1>EV Point</h1>
</div>

  <!-- MAP CARD -->
<iframe
  src="https://www.google.com/maps?q=Hyderabad&output=embed"
  width="100%"
  height="180"
  style="border-radius:12px; border:0;">
</iframe>
  <!-- BUTTON -->
<div class="btn">Book Charging Slots</div>

  <!-- SLOTS -->
  <div class="card">
    <h2>Charging Slots near you</h2>

    <!-- ITEM -->
    <div class="inner-card">
      <p>📍 Zeon Charging Station</p>
      <div class="row">
        <span>2 KM</span>
        <span>5A</span>
        <span>5 Hrs</span>
        <span>₹30</span>
      </div>
    </div>

    <div class="inner-card">
      <p>📍 Tata Power Charging Station</p>
      <div class="row">
        <span>1 KM</span>
        <span>10A</span>
        <span>2 Hrs</span>
        <span>₹20</span>
      </div>
    </div>

    <div class="inner-card">
      <p>📍 ElectricPe Charging Station</p>
      <div class="row">
        <span>2 KM</span>
        <span>15A</span>
        <span>1 Hr</span>
        <span>₹50</span>
      </div>
    </div>

    <div class="inner-card">
      <p>📍 GLIDA Charging Station</p>
      <div class="row">
        <span>2.5 KM</span>
        <span>5A</span>
        <span>3 Hrs</span>
        <span>₹27</span>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
  <div class="nav-item active">⛽</div>
  <div class="nav-item">⚙️</div>
  <div class="nav-item">⏱️</div>
  <div class="nav-item">🛵</div>
</div>

</div>
</body>
</html>
