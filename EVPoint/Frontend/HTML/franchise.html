<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../CSScss/style.css">
</head>
<body>

<div class="app">

  <div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
    <h1>Franchise / EV Biz</h1>
  </div>

  <p>Open a new franchise with us and through government</p>

  <div class="card">
    <h3>Owner Details</h3>
    <input class="input" placeholder="Enter name">
    <input class="input" placeholder="Enter Date of Birth">
    <input class="input" placeholder="Enter Phone Number">
  </div>

  <div class="card">
    <h3>Biz Details</h3>
    <input class="input" placeholder="Enter Business Name">
    <input class="input" placeholder="Enter Business Type">
    <input class="input" placeholder="Enter Business Place">
  </div>

  <div class="card">
    <h3>Charging Details</h3>
    <input class="input" placeholder="Enter Charger type">
    <input class="input" placeholder="Enter no of chargers">
    <input class="input" placeholder="Enter Charge capacity">
  </div>

  <button class="btn">Accept</button>

</div>

</body>
</html>
